groups:
  - name: day16-slo-rules
    rules:
      - record: job:node_exporter:up:ratio_5m
        expr: avg_over_time(up{job="node_exporter"}[5m])

      - record: job:node_exporter:up:ratio_1h
        expr: avg_over_time(up{job="node_exporter"}[1h])

      - record: job:node_exporter:up:ratio_24h
        expr: avg_over_time(up{job="node_exporter"}[24h])

      - record: job:node_exporter:error_budget_remaining_24h
        expr: (job:node_exporter:up:ratio_24h - 0.99) / (1 - 0.99)

      - alert: NodeExporterSLOBreaching
        expr: job:node_exporter:up:ratio_24h < 0.99
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "Node exporter SLO breach detected"
          description: "The 24h availability ratio for node_exporter is below 99%."

      - alert: NodeExporterFastBurn
        expr: job:node_exporter:up:ratio_1h < 0.95
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "Node exporter fast error budget burn"
          description: "The 1h availability ratio is below 95%, indicating rapid budget consumption."
