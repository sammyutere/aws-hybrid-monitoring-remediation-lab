global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers:
        - severity="page"
      receiver: page-receiver

    - matchers:
        - severity="ticket"
      receiver: ticket-receiver

receivers:
  - name: default-receiver

  - name: ticket-receiver

  - name: page-receiver
    webhook_configs:
      - url: "http://host.docker.internal:5001"
