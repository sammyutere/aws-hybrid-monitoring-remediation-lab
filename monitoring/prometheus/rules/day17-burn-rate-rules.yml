groups:
  - name: day17-burn-rate
    rules:
      - record: job:aws_node:error_rate_5m
        expr: 1 - job:aws_node:up:ratio_5m

      - record: job:aws_node:error_rate_1h
        expr: 1 - job:aws_node:up:ratio_1h

      - record: job:aws_node:burn_rate_5m
        expr: job:aws_node:error_rate_5m / 0.01

      - record: job:aws_node:burn_rate_1h
        expr: job:aws_node:error_rate_1h / 0.01

      - alert: AwsNodeFastBurnCritical
        expr: job:aws_node:burn_rate_5m > 14
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Fast burn rate critical"
          description: "Error budget burning more than 14 times faster than allowed."

      - alert: AwsNodeBurnRateHigh
        expr: job:aws_node:burn_rate_1h > 6
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "High burn rate detected"
          description: "Error budget consumption is elevated."

      - alert: AwsNodeBurnRateSlow
        expr: job:aws_node:burn_rate_1h > 3
        for: 10m
        labels:
          severity: ticket
        annotations:
          summary: "Slow burn rate detected"
          description: "Error budget is being consumed gradually."
