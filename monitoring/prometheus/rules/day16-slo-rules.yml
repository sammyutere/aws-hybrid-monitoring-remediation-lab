groups:
  - name: day16-slo-rules
    rules:
      - record: job:aws_node:up:ratio_5m
        expr: avg_over_time(up{job="aws-node"}[5m])

      - record: job:aws_node:up:ratio_1h
        expr: avg_over_time(up{job="aws-node"}[1h])

      - record: job:aws_node:up:ratio_24h
        expr: avg_over_time(up{job="aws-node"}[24h])

      - record: job:aws_node:error_budget_remaining_24h
        expr: (job:aws_node:up:ratio_24h - 0.99) / (1 - 0.99)

      - alert: AwsNodeSLOBreaching
        expr: job:aws_node:up:ratio_24h < 0.99
        for: 5m
        labels:
          severity: ticket
        annotations:
          summary: "aws-node SLO breach detected"
          description: "24h availability below 99%."

      - alert: AwsNodeFastBurn
        expr: job:aws_node:up:ratio_1h < 0.95
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "aws-node fast error budget burn"
          description: "1h availability below 95%."
